# Fine-tuning configuration: unfreeze backbone with differential LR
model:
  backbone: "google/timesfm-2.5-200m-pytorch"
  context_len: 512
  horizon_len: 128
  pooling: "mean"
  freeze_backbone: false
  extraction_mode: "hook"

classifier:
  type: "mlp"
  hidden_dims: [256]
  dropout: 0.2

training:
  epochs: 50
  batch_size: 16
  learning_rate: 1.0e-3
  backbone_lr: 1.0e-5
  weight_decay: 1.0e-4
  scheduler: "cosine"
  early_stopping_patience: 10

data:
  dataset: "ECG200"
  normalize: true
  seed: 42

device: "mps"  # Use "cuda" if GPU is available, otherwise fallback to "cpu"
